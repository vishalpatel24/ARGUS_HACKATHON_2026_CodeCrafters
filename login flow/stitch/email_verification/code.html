<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#0052cc",
                        "background-light": "#f5f7f8",
                        "background-dark": "#0f1723",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<title>Verify Your Email - GrantFlow</title>
</head>
<body class="bg-background-light dark:bg-background-dark font-display min-h-screen flex flex-col">
<!-- Navigation Header -->
<header class="flex items-center justify-between border-b border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 px-6 py-4 md:px-10">
<div class="flex items-center gap-2 text-primary">
<div class="size-8 bg-primary rounded flex items-center justify-center text-white">
<span class="material-symbols-outlined">payments</span>
</div>
<h1 class="text-slate-900 dark:text-slate-100 text-xl font-bold tracking-tight">GrantFlow</h1>
</div>
<button class="flex items-center justify-center rounded-lg h-10 w-10 bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-400 hover:bg-slate-200 dark:hover:bg-slate-700 transition-colors">
<span class="material-symbols-outlined">close</span>
</button>
</header>
<!-- Main Content -->
<main class="flex-1 flex items-center justify-center p-4">
<div class="max-w-md w-full bg-white dark:bg-slate-900 shadow-xl rounded-xl border border-slate-200 dark:border-slate-800 p-8">
<!-- Icon & Heading -->
<div class="flex flex-col items-center text-center mb-8">
<div class="w-16 h-16 bg-primary/10 rounded-full flex items-center justify-center mb-4">
<span class="material-symbols-outlined text-primary text-3xl">mail</span>
</div>
<h2 class="text-slate-900 dark:text-slate-100 text-2xl font-bold leading-tight">Verify your email</h2>
<p class="text-slate-500 dark:text-slate-400 mt-2">
                    Enter the 6-digit verification code sent to your email address.
                </p>
</div>
<!-- OTP Input Section -->
<div class="flex flex-col gap-6">
<div class="flex justify-between gap-2 sm:gap-4">
<input class="w-full h-14 text-center text-xl font-bold rounded-lg border-2 border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-900 dark:text-slate-100 focus:border-primary focus:ring-0 transition-all" maxlength="1" type="text" value=""/>
<input class="w-full h-14 text-center text-xl font-bold rounded-lg border-2 border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-900 dark:text-slate-100 focus:border-primary focus:ring-0 transition-all" maxlength="1" type="text" value=""/>
<input class="w-full h-14 text-center text-xl font-bold rounded-lg border-2 border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-900 dark:text-slate-100 focus:border-primary focus:ring-0 transition-all" maxlength="1" type="text" value=""/>
<input class="w-full h-14 text-center text-xl font-bold rounded-lg border-2 border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-900 dark:text-slate-100 focus:border-primary focus:ring-0 transition-all" maxlength="1" type="text" value=""/>
<input class="w-full h-14 text-center text-xl font-bold rounded-lg border-2 border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-900 dark:text-slate-100 focus:border-primary focus:ring-0 transition-all" maxlength="1" type="text" value=""/>
<input class="w-full h-14 text-center text-xl font-bold rounded-lg border-2 border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-900 dark:text-slate-100 focus:border-primary focus:ring-0 transition-all" maxlength="1" type="text" value=""/>
</div>
<!-- Action Buttons -->
<div class="flex flex-col gap-3 mt-2">
<button class="w-full h-12 bg-primary hover:bg-primary/90 text-white rounded-lg font-bold text-base transition-all shadow-lg shadow-primary/20 flex items-center justify-center gap-2">
                        Verify Code
                    </button>
<div class="flex items-center justify-center gap-2 mt-2">
<span class="text-slate-500 dark:text-slate-400 text-sm">Didn't receive the code?</span>
<button class="text-primary hover:text-primary/80 font-bold text-sm transition-colors">
                            Resend OTP
                        </button>
</div>
</div>
</div>
<!-- Security Footer -->
<div class="mt-8 pt-6 border-t border-slate-100 dark:border-slate-800 flex items-center justify-center gap-2 text-slate-400 dark:text-slate-500 text-xs">
<span class="material-symbols-outlined text-sm">lock</span>
<span>Secure 256-bit encrypted verification</span>
</div>
</div>
</main>
<!-- Footer Links -->
<footer class="px-6 py-6 text-center">
<p class="text-slate-400 dark:text-slate-600 text-sm">
            © 2024 GrantFlow Inc. All rights reserved. 
            <a class="underline hover:text-primary ml-2" href="#">Privacy Policy</a>
</p>
</footer>
</body></html>
