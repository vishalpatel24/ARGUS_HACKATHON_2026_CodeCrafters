<div class="layout-container">
  <header class="top-nav" [class.scrolled]="isScrolled">
    <div class="nav-container">
      <div class="brand" routerLink="/">
        <div class="logo-box">GF</div>
        <h1>GrantFlow</h1>
      </div>
      
      <div class="nav-right">
        <div class="nav-links">
          <ng-container *ngIf="authService.currentUser() as user; else loginBtn">
            <a routerLink="/dashboard" class="nav-link" routerLinkActive="active">Dashboard</a>
            <a *ngIf="user.role === 'Applicant'" routerLink="/organisations/profile" class="nav-link" routerLinkActive="active">Organisation</a>
            <a *ngIf="user.role === 'PlatformAdmin' || user.role === 'ProgramOfficer'" routerLink="/users" class="nav-link" routerLinkActive="active">Users</a>
            
            <div class="user-menu">
              <div class="user-info">
                <span class="user-name">{{ user.name }}</span>
                <span class="user-role">{{ user.role }}</span>
              </div>
              <button class="logout-link" (click)="logout()" title="Logout">
                <span class="logout-icon">📤</span>
              </button>
            </div>
          </ng-container>
          
          <ng-template #loginBtn>
            <a routerLink="/login" class="nav-link login-link">Login</a>
            <a routerLink="/register" class="btn-register">
              <span class="btn-text">Get Started</span>
              <span class="btn-glow"></span>
            </a>
          </ng-template>
        </div>
      </div>
    </div>
  </header>

  <main class="main-content">
    <router-outlet></router-outlet>
  </main>
</div>
