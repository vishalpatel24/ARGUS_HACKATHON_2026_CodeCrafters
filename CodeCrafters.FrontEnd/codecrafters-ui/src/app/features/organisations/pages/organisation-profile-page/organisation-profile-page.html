<div class="auth-wrapper">
  <div class="auth-card" style="max-width: 800px;">
    <div class="auth-header">
      <h2>Organisation Profile</h2>
      <p>Complete your organisation details to pre-fill grant applications.</p>
    </div>

    @if (isLoading) {
      <div style="text-align: center; padding: 2rem;">
        <div class="spinner" style="width: 40px; height: 40px; border: 3px solid #e2e8f0; border-top-color: #3b82f6; border-radius: 50%; animation: spin 0.7s linear infinite; margin: 0 auto 1rem;"></div>
        <span>Loading profile...</span>
      </div>
    } @else {
      @if (successMessage) {
        <div class="badge badge-success" style="width: 100%; text-align: center; margin-bottom: 1rem; padding: 1rem;">
          {{ successMessage }}
        </div>
      }

      @if (errorMessage) {
        <div class="error-alert">
          {{ errorMessage }}
        </div>
      }

      <form [formGroup]="profileForm" (ngSubmit)="onSubmit()" class="auth-form">
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem;">
          <!-- Basic Info -->
          <div style="grid-column: 1 / -1;">
            <h4 style="margin-bottom: 1rem; color: #64748b; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.05em; border-bottom: 1px solid #f1f5f9; padding-bottom: 0.5rem;">Basic Information</h4>
          </div>

          <div class="form-group">
            <label for="name">Organisation Name</label>
            <input type="text" id="name" formControlName="name" class="form-control" placeholder="Enter organisation name">
          </div>

          <div class="form-group">
            <label for="registrationNumber">Registration Number</label>
            <input type="text" id="registrationNumber" formControlName="registrationNumber" class="form-control" placeholder="Enter registration number">
          </div>

          <div class="form-group">
            <label for="type">Organisation Type</label>
            <select id="type" formControlName="type" class="form-control">
              <option value="">Select type</option>
              @for (type of organisationTypes; track type) {
                <option [value]="type">{{ type }}</option>
              }
            </select>
          </div>

          <div class="form-group">
            <label for="state">State</label>
            <select id="state" formControlName="state" class="form-control">
              <option value="">Select state</option>
              @for (state of indianStates; track state) {
                <option [value]="state">{{ state }}</option>
              }
            </select>
          </div>

          <div class="form-group">
            <label for="annualBudget">Annual Budget (₹)</label>
            <input type="number" id="annualBudget" formControlName="annualBudget" class="form-control" placeholder="Enter annual budget">
          </div>
          
          <div class="form-group">
            <label for="yearOfEstablishment">Year of Establishment</label>
            <input type="number" id="yearOfEstablishment" formControlName="yearOfEstablishment" class="form-control" placeholder="YYYY (e.g. 2010)">
          </div>

          <!-- Contact Person -->
          <div style="grid-column: 1 / -1; margin-top: 1rem;">
            <h4 style="margin-bottom: 1rem; color: #64748b; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.05em; border-bottom: 1px solid #f1f5f9; padding-bottom: 0.5rem;">Contact Person</h4>
          </div>

          <div class="form-group">
            <label for="contactPersonName">Full Name</label>
            <input type="text" id="contactPersonName" formControlName="contactPersonName" class="form-control" placeholder="Enter contact person name">
          </div>

          <div class="form-group">
            <label for="contactPersonEmail">Email Address</label>
            <input type="email" id="contactPersonEmail" formControlName="contactPersonEmail" class="form-control" placeholder="Enter contact person email">
          </div>

          <div class="form-group">
            <label for="contactPersonPhone">Phone Number</label>
            <input type="text" id="contactPersonPhone" formControlName="contactPersonPhone" class="form-control" placeholder="Enter contact person phone">
          </div>
        </div>

        <div style="margin-top: 2rem; display: flex; gap: 1rem;">
          <button type="submit" class="btn btn-primary" style="flex: 1;" [disabled]="profileForm.invalid || isSaving">
            {{ isSaving ? 'Saving...' : 'Save Profile' }}
          </button>
          <button type="button" class="btn btn-secondary" routerLink="/dashboard">Cancel</button>
        </div>
      </form>
    }
  </div>
</div>

<style>
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
