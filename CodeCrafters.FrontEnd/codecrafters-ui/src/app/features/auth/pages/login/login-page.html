<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-header">
      <h2>Welcome Back</h2>
      <p>Log in to your GrantFlow account</p>
    </div>
    
    <div *ngIf="errorMessage" class="error-alert">
      {{ errorMessage }}
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="auth-form">
      <div class="form-group">
        <label for="email">Email Address</label>
        <input id="email" type="email" formControlName="email" class="form-control" placeholder="admin@grantflow.com">
      </div>
      
      <div class="form-group">
        <label for="password">Password</label>
        <input id="password" type="password" formControlName="password" class="form-control" placeholder="••••••••">
      </div>
      
      <button type="submit" [disabled]="loginForm.invalid" class="btn btn-primary btn-block">Log In</button>
    </form>
    
    <div class="auth-footer">
      <p>Don't have an account? <a routerLink="/register">Register here</a></p>
    </div>
  </div>
</div>
