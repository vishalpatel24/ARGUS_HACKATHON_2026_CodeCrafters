<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-header">
      <h2>Create an Account</h2>
      <p>Apply for grants with GrantFlow</p>
    </div>
    
    <div *ngIf="errorMessage" class="error-alert">
      {{ errorMessage }}
    </div>

    <form [formGroup]="registerForm" (ngSubmit)="onSubmit()" class="auth-form">
      <div class="form-group">
        <label for="name">Full Name</label>
        <input id="name" type="text" formControlName="name" class="form-control" placeholder="John Doe">
      </div>

      <div class="form-group">
        <label for="email">Email Address</label>
        <input id="email" type="email" formControlName="email" class="form-control" placeholder="john@example.com">
      </div>

      <div class="form-group">
        <label for="phone">Phone Number (Optional)</label>
        <input id="phone" type="tel" formControlName="phone" class="form-control" placeholder="+1 234 567 8900">
      </div>
      
      <div class="form-group">
        <label for="password">Password</label>
        <input id="password" type="password" formControlName="password" class="form-control" placeholder="••••••••">
      </div>

      <div class="form-group">
        <label for="confirmPassword">Confirm Password</label>
        <input id="confirmPassword" type="password" formControlName="confirmPassword" class="form-control" placeholder="••••••••">
        <div *ngIf="registerForm.errors?.['mismatch'] && registerForm.get('confirmPassword')?.touched" style="color:red; font-size:12px;">
          Passwords do not match
        </div>
      </div>
      
      <button type="submit" [disabled]="registerForm.invalid" class="btn btn-primary btn-block">Register</button>
    </form>
    
    <div class="auth-footer">
      <p>Already have an account? <a routerLink="/login">Log in here</a></p>
    </div>
  </div>
</div>
