<div class="auth-wrapper">
  <div class="auth-card" style="max-width: 500px;">
    <div class="auth-header">
      <h2>Create New User</h2>
      <p>Add a new user to the system</p>
    </div>
    
    <div *ngIf="errorMessage" class="error-alert">
      {{ errorMessage }}
    </div>

    <form [formGroup]="createForm" (ngSubmit)="onSubmit()" class="auth-form">
      <div class="form-group">
        <label for="name">Full Name</label>
        <input id="name" type="text" formControlName="name" class="form-control" placeholder="John Doe">
      </div>

      <div class="form-group">
        <label for="email">Email Address</label>
        <input id="email" type="email" formControlName="email" class="form-control" placeholder="john@example.com">
      </div>

      <div class="form-group">
        <label for="phone">Phone Number (Optional)</label>
        <input id="phone" type="tel" formControlName="phone" class="form-control" placeholder="+1 234 567 8900">
      </div>
      
      <div class="form-group">
        <label for="role">User Role</label>
        <select id="role" formControlName="role" class="form-control">
          <option *ngFor="let role of roles" [value]="role">{{ role }}</option>
        </select>
      </div>
      
      <div class="form-group">
        <label for="password">Initial Password</label>
        <input id="password" type="password" formControlName="password" class="form-control" placeholder="••••••••">
      </div>
      
      <div style="display: flex; gap: 1rem; margin-top: 2rem;">
        <button type="button" routerLink="/users" class="btn" style="flex: 1; background-color: #e2e8f0; color: #475569;">Cancel</button>
        <button type="submit" [disabled]="createForm.invalid" class="btn btn-primary" style="flex: 1;">Create User</button>
      </div>
    </form>
  </div>
</div>
